<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

  body { background: #f0f0f0; min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  /* SCREEN 1 - WELCOME */
  #screen1 {
    background: #111;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    text-align: center;
  }

  #screen1 h1 { font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  #screen1 p { font-size: 15px; color: #888; margin-bottom: 48px; }

  #screen1 input {
    width: 100%;
    max-width: 360px;
    padding: 14px 16px;
    font-size: 15px;
    border: 2px solid #444;
    background: #222;
    color: #fff;
    outline: none;
    display: block;
    margin: 0 auto 12px;
  }

  #screen1 input::placeholder { color: #555; }
  #screen1 input:focus { border-color: #fff; }

  #screen1 button {
    width: 100%;
    max-width: 360px;
    background: #fff;
    color: #111;
    border: none;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: block;
    margin: 0 auto;
  }

  #screen1 button:hover { background: #ddd; }

  /* SCREEN 2 - APP */
  #screen2 {
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    background: #f0f0f0;
  }

  .app-header {
    background: #111;
    color: #fff;
    width: 100%;
    padding: 28px 24px 22px;
    margin-bottom: 24px;
  }

  .app-header .greeting { font-size: 13px; color: #888; margin-bottom: 4px; }
  .app-header h2 { font-size: 22px; font-weight: 700; }

  .app-body { width: 100%; max-width: 480px; padding: 0 16px; }

  .input-row { display: flex; margin-bottom: 16px; }

  .input-row input {
    flex: 1;
    padding: 12px 14px;
    font-size: 15px;
    border: 2px solid #111;
    background: #fff;
    outline: none;
  }

  .input-row button {
    background: #111;
    color: #fff;
    border: none;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .input-row button:hover { background: #333; }

  .list { background: #fff; border: 2px solid #111; }

  .item {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #ddd;
    gap: 12px;
  }

  .item:last-child { border-bottom: none; }
  .item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .item span { flex: 1; font-size: 15px; color: #111; }
  .item.done span { text-decoration: line-through; color: #aaa; }
  .del-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
  .del-btn:hover { color: #e00; }

  .empty { padding: 24px; text-align: center; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<!-- SCREEN 1: WELCOME -->
<div class="screen active" id="screen1">
  <h1>To Do</h1>
  <p>Stay focused. Get things done.</p>
  <input id="nameInp" type="text" placeholder="Enter your name..." maxlength="40">
  <button onclick="goToApp()">Get Started →</button>
</div>

<!-- SCREEN 2: APP -->
<div class="screen" id="screen2">
  <div class="app-header">
    <div class="greeting">Hello,</div>
    <h2 id="userName"></h2>
  </div>
  <div class="app-body">
    <div class="input-row">
      <input id="taskInp" type="text" placeholder="Add a task..." maxlength="120">
      <button onclick="add()">Add</button>
    </div>
    <div class="list" id="list"><div class="empty">No tasks yet.</div></div>
  </div>
</div>

<script>
  let tasks = [];

  document.getElementById('nameInp').addEventListener('keydown', e => { if (e.key === 'Enter') goToApp(); });
  document.getElementById('taskInp').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

  function goToApp() {
    const name = document.getElementById('nameInp').value.trim() || 'there';
    document.getElementById('userName').textContent = name;
    document.getElementById('screen1').classList.remove('active');
    document.getElementById('screen2').classList.add('active');
    document.getElementById('taskInp').focus();
  }

  function add() {
    const inp = document.getElementById('taskInp');
    const text = inp.value.trim();
    if (!text) return;
    tasks.push({ id: Date.now(), text, done: false });
    inp.value = '';
    render();
  }

  function toggle(id) { tasks.find(t => t.id === id).done ^= 1; render(); }
  function remove(id) { tasks = tasks.filter(t => t.id !== id); render(); }

  function render() {
    const list = document.getElementById('list');
    if (!tasks.length) { list.innerHTML = '<div class="empty">No tasks yet.</div>'; return; }
    list.innerHTML = tasks.map(t => `
      <div class="item ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
        <span>${t.text.replace(/</g,'&lt;')}</span>
        <button class="del-btn" onclick="remove(${t.id})">×</button>
      </div>
    `).join('');
  }
</script>
</body>
</html>
